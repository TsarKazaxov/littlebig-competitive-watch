<style>

  .brand-header { padding: 34px 0 8px; }

  .breadcrumb a:hover { color: #fff; }

  .cat-heading {

  .cat-heading:first-child { margin-top: 0; }

  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 10px 16px; margin-bottom: 18px;
  }
  .filter-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--vc-text-2); margin-right: 2px; }
  .filter-chip {

  /* =========================================================
     VeilleCard — carte d'identité "veille concurrentielle"
     (verbatim from design handoff: README.md / veille-card.html)
     ========================================================= */
  .material-symbols-rounded {
    font-family: 'Material Symbols Rounded';
    font-weight: normal; font-style: normal;
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    line-height: 1; letter-spacing: normal; white-space: nowrap;
  }

  .vc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 24px; align-items: stretch; }

  .vc-card {
    position: relative; overflow: hidden; box-sizing: border-box;
    display: flex; flex-direction: column; min-height: 300px;
    padding: 22px 22px 22px 26px; border-radius: 18px;
    background: linear-gradient(160deg, rgba(30,36,66,.78), rgba(19,23,46,.70));
    -webkit-backdrop-filter: blur(20px) saturate(140%); backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255,255,255,.36);
    box-shadow: 0 14px 40px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.30);
    font-family: 'Poppins', system-ui, sans-serif; color: var(--vc-text);
    cursor: pointer;
    transition: transform .28s cubic-bezier(.2,0,0,1), box-shadow .28s cubic-bezier(.2,0,0,1);
  }
  .vc-card:hover { transform: translateY(-6px); box-shadow: 0 30px 60px rgba(0,0,0,.52), inset 0 1px 0 rgba(255,255,255,.36); }
  .vc-card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background: var(--vc-accent); }
  .vc-card[data-status="new"]      { --vc-accent: var(--vc-accent-new); }
  .vc-card[data-status="read"]     { --vc-accent: var(--vc-accent-read); }
  .vc-card[data-status="uptodate"] { --vc-accent: var(--vc-accent-uptodate); }

  .vc-badge {
    display: none; position: absolute; top: 14px; right: 14px; align-items: center; gap: 7px;
    padding: 4px 10px 4px 8px; border-radius: 999px;
    background: rgba(143,176,255,.24); border: 1px solid rgba(143,176,255,.60);
    font: 600 10.5px 'Poppins', sans-serif; color: #dbe6ff;
  }
  .vc-card[data-status="new"] .vc-badge { display: inline-flex; }
  .vc-badge-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--vc-accent-new); animation: vc-glow 1.8s ease-in-out infinite; }

  .vc-head { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
  .vc-logo-wrap { position: relative; flex: none; }
  .vc-logo-ring { display: none; position: absolute; inset: 0; border-radius: 14px; }
  .vc-card[data-status="new"] .vc-logo-ring { display: block; animation: vc-pulse 2.2s ease-out infinite; }
  .vc-logo, .vc-logo-badge {
    position: relative; width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #2c54f4, #5e86ff);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font: 700 15px 'Poppins', sans-serif; box-shadow: 0 6px 16px rgba(0,0,0,.40);

  .vc-name { display: flex; align-items: center; gap: 7px; font: 600 17px/1.2 'Poppins', sans-serif; color: var(--vc-text); }
  .vc-name-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vc-flag { font-size: 15px; }
  .vc-country { font: 500 12px 'Poppins', sans-serif; color: var(--vc-text-2); margin-top: 3px; }

  .vc-sector {
    align-self: flex-start; padding: 5px 12px; border-radius: 999px;
    background: rgba(255,255,255,.17); border: 1px solid rgba(255,255,255,.44);
    font: 500 11.5px 'Poppins', sans-serif; color: var(--vc-text); margin-bottom: 16px;
  }

  .vc-signal { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
  .vc-signal-icon { font-size: 24px; color: var(--vc-accent); }
  .vc-signal-label { font: 600 14px 'Poppins', sans-serif; color: var(--vc-text); }
  .vc-signal-sub   { font: 400 11.5px 'Poppins', sans-serif; color: var(--vc-text-2); }

  .vc-teaser { flex: 1; margin: 0 0 16px; font: 400 13px/1.55 'Poppins', sans-serif; color: var(--vc-text-3); }

  .vc-link { display: inline-flex; align-items: center; gap: 5px; font: 600 13px 'Poppins', sans-serif; color: var(--vc-link); text-decoration: none; transition: color .18s; }
  .vc-link:hover { color: #fff; }
  .vc-link .material-symbols-rounded { font-size: 17px; }

  @keyframes vc-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(143,176,255,.7); }
    70%  { box-shadow: 0 0 0 9px rgba(143,176,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(143,176,255,0); }
  }
  @keyframes vc-glow {
    0%, 100% { box-shadow: 0 0 8px 1px rgba(143,176,255,.6); }
    50%      { box-shadow: 0 0 13px 3px rgba(143,176,255,1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .vc-badge-dot, .vc-logo-ring, .vc-card { animation: none !important; transition: none !important; }
  }

  /* ---- Company detail page & remaining chrome, re-themed for dark ---- */
  .company-head { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .company-head h1 { margin: 0; }
  .company-head .vc-logo-badge { width: 52px; height: 52px; font-size: 16px; border-radius: 16px; }
  .company-sub { font-size: 12.5px; color: var(--vc-text-2); margin-bottom: 22px; }

  .detail-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 18px 20px; margin-bottom: 18px;

  .detail-card.lbc { background: rgba(71,120,255,.14); border-color: rgba(71,120,255,.40); }
  .detail-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .detail-head h2 { font-size: 15px; margin: 0; color: var(--vc-text); font-weight: 700; }
  .updated { font-size: 11px; color: var(--vc-text-2); }
  ul.items { list-style: none; margin: 0; padding: 0; }
  ul.items li { padding: 9px 0; border-top: 1px solid rgba(255,255,255,.14); font-size: 13px; line-height: 1.5; color: var(--vc-text-3); }
  ul.items li:first-child { border-top: none; }
  .conf { display: inline-block; font-size: 10.5px; font-weight: 600; padding: 1px 7px; border-radius: 999px; margin-left: 6px; vertical-align: middle; white-space: nowrap; }
  .conf-high { background: rgba(94,224,143,.18); color: #5ee08f; }
  .conf-med { background: rgba(255,196,84,.20); color: #ffc454; }
  .conf-low { background: rgba(255,120,120,.20); color: #ff8a8a; }
  .conf-na { background: rgba(255,255,255,.10); color: var(--vc-text-2); }
  .cat-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 999px; margin-right: 6px; vertical-align: middle; white-space: nowrap; background: rgba(188,208,255,.18); color: var(--vc-link); }
  .src { display: block; font-size: 11.5px; margin-top: 3px; }
  .src a { color: var(--vc-text-2); text-decoration: none; border-bottom: 1px dotted rgba(255,255,255,.30); margin-right: 8px; }
  .src a:hover { color: #fff; }
  .watch { margin-top: 10px; font-size: 12px; color: var(--vc-text-2); background: rgba(255,255,255,.05); border-radius: 10px; padding: 8px 10px; }
  .lbc .watch { background: rgba(71,120,255,.14); color: var(--vc-text-3); }

  .tag { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,.10); border: 1px solid var(--glass-border); color: var(--vc-text-2); }
  .tag-lbc { color: var(--vc-link); background: rgba(71,120,255,.18); border-color: rgba(71,120,255,.40); }

  .badge-new { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; background: var(--orange); color: #1c1200; padding: 2px 7px; border-radius: 999px; vertical-align: middle; }
  .flag-inline { margin-right: 2px; }

  .methodology { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 14px 18px; font-size: 12.5px; color: var(--vc-text-3); line-height: 1.6; margin-bottom: 20px; }
  .methodology b { color: var(--vc-text); }
  .history-entry { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 10px 14px; font-size: 12.5px; color: var(--vc-text-3); margin-bottom: 10px; }
  .history-entry .date { font-weight: 700; color: var(--vc-text); margin-right: 6px; }
</style>

":"https://www.littlebigconnection.com/en/platform"}]},{"text":"Revenue reported at €400M in 2023 with a stated ambition of €500M by 2025; ~400 employees, operations in 50 countries.","conf":"low","pct":45,"sources":[{"label":"ZoomInfo","url":"https://www.zoominfo.com/c/little-big-connection/425780834"},{"label":"LeadIQ","url":"https://leadiq.com/c/littlebig-connection/5a1d9d9d23000059008d79dc"}]},{"text":"Public funding trackers show only one very old round: $1.1M in 2017 — clearly stale/incomplete relative to a company of this reported size.","conf":"low","pct":40,"sources":[{"label":"Crunchbase","url":"https://www.crunchbase.com/organization/little-big-connection"},{"label":"PitchBook","url":"https://pitchbook.com/profiles/company/264547-36"}]},{"text":"2026 stated priority: expand collaboration across all intellectual services (beyond IT), continued investment in platform, AI and local teams.","conf":"high","pct":80,"sources":[{"label":"LBC Blog (official, 2025 wrap-up)","url":"https://www.littlebigconnection.com/en/blog/business/2025-wrap-up"}]}],"watch":"Self-check takeaway: financial/funding data on third-party trackers (Crunchbase, PitchBook, ZoomInfo) is stale or unconfirmed — a competitor relying on those tools alone would badly underestimate us."},"country":"FR","flag":"🇫🇷","addedISO":"2026-07-08","core":true},{"id":"malt","name":"Malt","mono":"MLT","category":"fr-eu-marketplaces","tag":"FR / Europe","ux":{"updatedISO":"2026-07-08","items":[{"cat":"Contract mgmt","text":"'Seamless Project Renewals' — renew an ongoing project in one click, reducing admin friction for repeat missions.","conf":"med","pct":80,"sources":[{"label":"Malt Resources (official, April 2026 release notes)","url":"https://www.malt.fr/resources/article/new-product-updates-april-2026"}]},{"cat":"Admin / back-office","text":"'Quotes as Templates' — freelancers can turn a past quote into a reusable template to speed up new proposals.","conf":"med","pct":80,"sources":[{"label":"Malt Resources (official)","url":"https://www.malt.fr/resources/article/new-product-updates-april-2026"}]},{"cat":"Content / positioning","text":"Published 'Malt Tech Trends 2026' — thought-leadership report, not a product feature but signals category positioning (this quarter's deep-dive: low-code).","conf":"med","pct":60,"sources":[{"label":"Malt.com","url":"https://www.malt.com/resources/trends/malt-tech-trends"}]}],"watch":"Watch for: how 'highlighting user experience' (Malt's stated Q2 focus) translates into profile/portfolio redesign."},"biz":{"updatedISO":"2026-07-08","items":[{"text":"850,000 freelancers on the marketplace, 1,640 employees (Feb 2026). Published the Malt Tech Trends 2026 report.","conf":"med","pct":70,"sources":[{"label":"Tracxn","url":"https://tracxn.com/d/companies/malt/__rT6uv8EpLLHA9wEaOtMlspJrAheSPlOkzDPtfIg40qA"}]},{"text":"Last known funding round: €80M in 2021 (Goldman Sachs Growth Equity, Eurazeo), $489M valuation. No new round identified since.","conf":"high","pct":90,"sources":[{"label":"TechCrunch","url":"https://techcrunch.com/2021/05/31/malt-raises-97m-at-a-489m-valuation-for-its-freelance-marketplace-for-developers/"},{"label":"Sifted","url":"https://sifted.eu/articles/malt-fundraise-freelancers"}]},{"text":"AI-powered search integrated to speed up talent sourcing and matching.","conf":"med","pct":65,"sources":[{"label":"Malt.com","url":"https://www.malt.com/"}]}],"watch":"Watch for: new funding round, international expansion, enterprise-facing AI features."},"country":"FR","flag":"🇫🇷","addedISO":"2026-07-08","core":true},{"id":"lehibou","name":"LeHibou","mono":"LHB","category":"fr-eu-marketplaces","tag":"FR — Tech & Innovation","ux":{"updatedISO":"2026-07-08","items":[{"cat":"Mobile / notifications","text":"iOS app update: alert management for new missions (add/edit/delete alerts) and a new home-screen availability widget.","conf":"med","pct":60,"sources":[{"label":"Apple App Store listing","url":"https://apps.apple.com/us/app/lehibou-fr ,"addedISO":"2026-07-10"},{"id":"mercor","name":"Mercor","mono":"MCR","category":"ai-native","tag":"AI-Native — Global","ux":{"updatedISO":"2026-07-10","items":[{"cat":"Product","text":"AI-driven matching platform connecting engineers, researchers and domain experts to AI labs (including OpenAI, Anthropic and Meta) for both project work and AI-training/evaluation data work. No dated consumer-facing feature changelog found yet.","conf":"na","pct":null,"sources":[{"label":"Mercor (official blog)","url":"https://www.mercor.com/blog/series-c/"}]}],"watch":"First pass for this entity (added July 10, 2026) — check mercor.com blog directly for product-specific announcements next week."},"biz":{"updatedISO":"2026-07-10","items":[{"text":"Reported to be in talks for a $20B valuation as of mid-2026, roughly double the $10B valuation set nine months earlier. Previously raised a $350M Series C (October 2025) led by Felicis with Benchmark, General Catalyst and Robinhood Ventures participating, at the $10B valuation (5x its Series B). Reported 2026 revenue of $1.5B and free-cash-flow profitability since early 2026.","conf":"med","pct":70,"sources":[{"label":"CNBC","url":"https://www.cnbc.com/2025/10/27/ai-hiring-startup-mercor-funding.html"},{"label":"TechBuzz","url":"https://www.techbuzz.ai/articles/mercor-eyes-20b-valuation-doubling-in-just-9-months"}]}],"watch":"New addition (July 10, 2026): fastest-growing entity in this watch by valuation trajectory — directly relevant to LBC as AI-native talent matching becomes a bigger part of the competitive landscape. The $20B figure is reported as in-talks, not closed."},"country":"US","flag":"🇺🇸","addedISO":"2026-07-10"},{"id":"turing","name":"Turing","mono":"TUR","category":"ai-native","tag":"AI-Native — Global","ux":{"updatedISO":"2026-07-10","items":[{"cat":"Product","text":"Positions its matching engine around fast turnaround for mainstream stacks (React, Python, Node.js, Java, Go), plus talent-management tooling (time tracking, virtual stand-ups, performance monitoring) once a developer is placed. No dated 2026 changelog found yet.","conf":"low","pct":45,"sources":[{"label":"Turing (official)","url":"https://www.turing.com/"}]}],"watch":"First pass for this entity (added July 10, 2026) — sources so far are mostly third-party reviews rather than Turing's own changelog."},"biz":{"updatedISO":"2026-07-10","items":[{"text":"AI-powered remote-developer marketplace with a claimed pool of 1M+ pre-vetted developers across 140+ countries; billing for senior engineers estimated by third parties at $60-200/hour or $10,000-18,000/month for full-time engagements (Turing does not publish rates itself).","conf":"low","pct":45,"sources":[{"label":"Third-party reviews (rates not confirmed by Turing directly)","url":"https://www.turing.com/talent"}]}],"watch":"New addition (July 10, 2026): same elite-vetted-talent segment as Toptal. Company-reported funding/revenue figures not found via official channels yet."},"country":"US","flag":"🇺🇸","addedISO":"2026-07-10"},{"id":"deel","name":"Deel","mono":"DEE","category":"eor-aor","tag":"Global — HR/Payroll Tech","ux":{"updatedISO":"2026-07-10","items":[{"cat":"Payments / Reporting","text":"'July Product Update': Withdrawals upgrade improving the contractor payment experience, a new Reports feature consolidating contract/payment/productivity data in one place, and 90+ new contract currencies added (incl. Moroccan Dirham, Bermudan Dollar, Egyptian Pound) so contractors can get paid locally without SWIFT fees.","conf":"high","pct":85,"sources":[{"label":"Deel Blog (official)","url":"https://www.deel.com/blog/july-product-update/"}]},{"cat":"Release process","text":"New product release framework (announced March 2026): features now ship on a predictable monthly cadence, the second Wednesday of every month.","conf":"high","pct":90,"sources":[{"label":"Deel Blog (official)","url":"https://www.deel.com/blog/new-product-release-framework/"}]},{"cat":"AI / automation","text": anCraft (official)","url":"https://www.humancraft.eu/mission-freelance/"}]}],"watch":"New addition (July 10, 2026): smaller-scale France sourcing/portage player — figures are self-reported and not independently corroborated."},"country":"FR","flag":"🇫🇷","addedISO":"2026-07-10"},{"id":"beteam","name":"Beteam","mono":"BTM","category":"portage-sourcing","tag":"FR — Portage & MSP","ux":{"updatedISO":"2026-07-10","items":[{"cat":"No update found","text":"No consumer-facing product/app surfaced — Beteam operates as a B2B commercial-portage and sourcing service rather than a self-serve platform.","conf":"na","pct":null,"sources":[{"label":"Beteam (official)","url":"https://www.beteam.fr/"}]}],"watch":"First pass for this entity (added July 10, 2026)."},"biz":{"updatedISO":"2026-07-10","items":[{"text":"Two main activities: skills sourcing and commercial portage, plus MSP and purchasing advisory for large groups managing external suppliers/freelancers. Says it applies competitive commercial-portage rates with full cost transparency toward clients and supported consultants.","conf":"med","pct":55,"sources":[{"label":"Beteam (official)","url":"https://www.beteam.fr/"}]}],"watch":"New addition (July 10, 2026): smallest-scale entity in this watch — kept for the sourcing/MSP angle relevant to LBC's own purchasing-side offer."},"country":"FR","flag":"🇫🇷","addedISO":"2026-07-10"},{"id":"isupplier","name":"iSupplier","mono":"ISP","category":"portage-sourcing","tag":"FR/Global — Sourcing SaaS","ux":{"updatedISO":"2026-07-10","items":[{"cat":"Product","text":"SaaS platform combining AI and human expertise to simplify tail-spend procurement and intellectual-services sourcing; claims to cut administrative workload by ~30% and supplier-management costs threefold via custom real-time dashboards. No dated 2026 changelog found yet.","conf":"low","pct":50,"sources":[{"label":"iSupplier (official)","url":"https://isupplier.us/isupplier-introduction/"}]}],"watch":"First pass for this entity (added July 10, 2026)."},"biz":{"updatedISO":"2026-07-10","items":[{"text":"Self-reported 2022 figures: €80M in revenue, 1,000+ missions completed, operating in 25+ countries. For freelancers, the platform handles contracts, activity reports and self-billing, with costs starting from 3% of average daily rate.","conf":"low","pct":45,"sources":[{"label":"iSupplier (official)","url":"https://isupplier.us/suppliers/"}]}],"watch":"New addition (July 10, 2026): a sourcing/procurement SaaS rather than a pure marketplace — closest fit is LBC's own purchasing/Rise value proposition. Figures are dated (2022) and self-reported — verify for anything more recent next pass."},"country":"FR","flag":"🇫🇷","addedISO":"2026-07-10"},{"id":"yourworkbuddy","name":"Your Work Buddy","mono":"YWB","category":"new-entrants","tag":"New entrant — Tech Freelance","ux":{"updatedISO":"2026-07-10","items":[{"cat":"Launch / discovery","text":"Official launch (July 7, 2026): a tech-focused talent marketplace built around direct messaging-style connection between vetted professionals (design, dev, engineering, marketing, writing) and businesses — no open bidding, no proposal cycles. Built-in wallet holds funds until delivery.","conf":"high","pct":80,"sources":[{"label":"GlobeNewswire (official press release)","url":"https://www.globenewswire.com/news-release/2026/07/07/3323601/0/en/Your-Work-Buddy-Launches-to-Turn-Tech-Expertise-Into-Income-Twice-Freelance-Work-and-Digital-Products.html"}]},{"cat":"Monetization / UX","text":"Freelancers can also sell productized digital products through a built-in marketplace for recurring income beyond billable hours — a hybrid marketplace + productized-services model, distinct from other tracked entities.","conf":"high","pct":75,"sources":[{"label":"GlobeNewswire (official press release)","url":"https://www.globenewswire.com/news-release/2026/07/07/3323601/0/en/Your-Work-Buddy-Launches-to-Turn-Tech-Expertise-Into-Income-Twice-Freelance-Work-and-Digital-Products.html"}]}],"watch":"Added via the discovery search for new/emerging entrants — not because it's yet a major competitive threat. Day-one launch; revisit weekly for traction/funding signals."},"biz":{"updatedISO":"2026-07-10","items":[{"text":"New tech-focused talent marketplace, officially launched July 7, 2026. Positions against 'open bidding' incumbents with a direct-connection model, a built-in escrow wallet, and a secondary revenue stream letting freelancers sell productized digital goods for recurring income.","conf":"high","pct":80,"sources":[{"label":"GlobeNewswire (official press release)","url":"https://www.globenewswire.com/news-release/2026/07/07/3323601/0/en/Your-Work-Buddy-Launches-to-Turn-Tech-Expertise-Into-Income-Twice-Freelance-Work-and-Digital-Products.html"}]}],"watch":"Day-one launch — no funding, traction, or independent press coverage yet to cross-check against."},"country":"XX","flag":"🌐","addedISO":"2026-07-10"},{"id":"transformify","name":"Transformify (TFY)","mono":"TFY","category":"vms-msp","tag":"Global — Unified ATS/VMS/EOR","country":"GB","flag":"🇬🇧","addedISO":"2026-07-10","ux":{"updatedISO":"2026-07-10","items":[{"cat":"Product","text":"AI-powered ATS with direct ChatGPT integration for candidate-job matching, combined with contractor management and global payments (SWIFT, SEPA, ACH, Revolut, PayPal, Venmo, Mastercard/Payoneer) in one platform. No dated 2026 feature-release note found yet.","conf":"low","pct":50,"sources":[{"label":"Transformify (official)","url":"https://www.transformify.org/"}]}],"watch":"First pass for this entity (added July 10, 2026, via continuous discovery monitoring) — check transformify.org blog directly for dated releases next week."},"biz":{"updatedISO":"2026-07-10","items":[{"text":"Founded 2015 in London; positions as an all-in-one workforce management platform unifying AI-powered ATS, Contractor of Record / EOR, and contractor payments across 184+ countries. Ranked in the FT1000: Europe's Fastest-Growing Companies 2026; backed by an Innovate UK grant (2020) to develop its ATS.","conf":"med","pct":60,"sources":[{"label":"Transformify (official)","url":"https://www.transformify.org/"}]}],"watch":"New addition (July 10, 2026): surfaced during the first continuous-discovery pass covering Product Hunt's Freelance/Remote Work/HR-tech topics plus general web search. Not a brand-new company (founded 2015) but newly added to this watch — same VMS/EOR-adjacent segment as Magnit and Pontoon. Figures are self-reported; verify independently next pass."}}],"history":[{"date":"July 10, 2026","text":"Added continuous discovery monitoring: every run now explicitly scans Product Hunt (Freelance, Remote Work, Human Resources topics) in addition to general web search, so new/emerging competitors surface faster. Added country/market flags to every entity plus a filter bar (by country and a New-only toggle) on the Home and Category views, and a time-based 'NEW' badge (auto-computed from each entity's addedISO, visible for 30 days after it's added) that now travels with an entity into its proper category instead of only living in the New Entrants holding category. First continuous-discovery pass found Transformify (TFY) — a London-founded, unified ATS/VMS/EOR platform — added to VMS/MSP. Checked Product Hunt's Freelance topic directly; no other qualifying new marketplace/EOR/VMS launch found this pass."},{"date":"July 10, 2026","text":"Site rebuilt around a 3-tier navigation (categorized home glance view → category pages → per-company detail pages) grouped into 7 categories, and coverage expanded from 11 to 23 tracked entities at the user's request. Added: Mercor, Turing (AI-native talent platforms); Remote.com (EOR); Magnit, Pontoon (VMS/MSP); Free-Work, FreelanceRepublik (France/Europe marketplaces); Contra (global marketplace); Freelance.com/Inop's, HumanCraft, Beteam, iSupplier (France portage & sourcing). Logos are stylized initials rather than scraped brand marks, to avoid trademark/copyright issues. Excluded after review: Tier-1 consulting/staffing giants (Capgemini, Amaris — traditional staffing, not digital marketplaces), AI recruiting/sourcing tools that are not marketplaces (Juicebox, SeekOut, Paradox, MetaView), a solopreneur back-office SaaS (Collective.com), and French interim/student gig apps (Staffme, Staffmatch, Side — different segment). Three names from the source list (COI, JM.io, CDIC) could not be matched to a verifiable company and were left out."},{"date":"July 10, 2026","text":"Weekly full-coverage pass across the (then) 11 tracked entities. New: Deel shipped a July Product Update (Withdrawals upgrade, Reports feature, 90+ new contract currencies); Upwork secured a $150M revolving credit facility; Freelancer.com appointed Dylan Carter as CFO effective May 18, 2026; corrected Toptal's Newsweek ranking entry (confirmed #10 overall / #1 Professional Services via Business Wire, replacing an unverified '#11' figure). No material change for Malt, Fiverr, Lifted, LeHibou, Comet, LittleBig Connection, or Your Work Buddy. Discovery searches surfaced only SEO-listicle mentions (Jobbers.io, Contra, Braintrust AIR, Pepper) with no dated primary-source launch — none added at the time (Contra was added later the same day after direct user review)."},{"date":"July 10, 2026 (earlier pass)","text":"Manual pipeline validation run: site migrated to GitHub Pages this week, and the widened discovery-search step was tested for the first time — found 'Your Work Buddy,' a tech freelance marketplace officially launched July 7, 2026, added as a new card."},{"date":"July 9, 2026","text":"One-day follow-up pass. New: Upwork added Claire Bramley and David Lissy to its Board; Toptal's acquisition streak surfaced (QO Collective, Adeva). No material change for Malt, Lifted, LeHibou, Comet, Deel, or LittleBig Connection."},{"date":"July 8, 2026","text":"Added the LittleBig Connection self-check card. First research pass across the original 9 competitors (Malt, Fiverr, Upwork, Lifted, Freelancer.com, LeHibou, Comet, Toptal, Deel)."}]}

<script>
(function(){
  var DATA = JSON.parse(document.getElementById('watch-data').textContent);
  var catById = {}; DATA.categories.forEach(function(c){ catById[c.id] = c; });
  var entById = {}; DATA.entities.forEach(function(e){ entById[e.id] = e; });

  var FILTERS = loadFilters();
  function loadFilters(){
    try { var raw = localStorage.getItem('watchFilters'); if(raw) return JSON.parse(raw); } catch(e){}
    return { countries: null, newOnly: false };
  }
  function saveFilters(){ try { localStorage.setItem('watchFilters', JSON.stringify(FILTERS)); } catch(e){} }
  function countryCounts(){
    var set = {};
    DATA.entities.forEach(function(e){ set[e.country] = (set[e.country]||0) + 1; });
    return set;
  }
  function countryActive(code){ return !FILTERS.countries || FILTERS.countries.indexOf(code) !== -1; }
  function toggleCountry(code){
    var all = Object.keys(countryCounts());
    if(!FILTERS.countries) FILTERS.countries = all.slice();
    var idx = FILTERS.countries.indexOf(code);
    if(idx === -1) FILTERS.countries.push(code); else FILTERS.countries.splice(idx,1);
    if(FILTERS.countries.length === all.length) FILTERS.countries = null;
    saveFilters(); router();
  }
  function toggleNewOnly(){ FILTERS.newOnly = !FILTERS.newOnly; saveFilters(); router(); }
  function resetFilters(){ FILTERS = { countries: null, newOnly: false }; saveFilters(); router(); }
  window.toggleCountry = toggleCountry;
  window.toggleNewOnly = toggleNewOnly;
  window.resetFilters = resetFilters;
  function isNewEntity(ent){
    if(ent.core) return false;
    if(!ent.addedISO || !DATA.meta.lastUpdated) return false;
    var diffDays = (new Date(DATA.meta.lastUpdated) - new Date(ent.addedISO)) / 86400000;
    return diffDays >= 0 && diffDays <= 30;
  }
  function passesFilters(ent){
    if(ent.special === 'lbc') return true; // self-check reference card: always shown, exempt from market/new filters
    if(FILTERS.newOnly && !isNewEntity(ent)) return false;
    if(!countryActive(ent.country)) return false;
    return true;
  }
  var COUNTRY_NAMES = { FR:'France', US:'United States', GB:'United Kingdom', AU:'Australia', IL:'Israel', XX:'Global / Unspecified' };
  function countryFlagOf(code){
    var found = DATA.entities.find(function(x){ return x.country === code; });
    return found ? found.flag : '\ud83c\udf10';
  }
  function renderFilterBar(){
    var counts = countryCounts();
    var codes = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
    var html = '<div class="filter-bar"><span class="filter-label">Market</span>';
    codes.forEach(function(code){
      var active = countryActive(code);
      html += '<button class="filter-chip'+(active?' active':'')+'" onclick="toggleCountry(\''+code+'\')">'+countryFlagOf(code)+' '+esc(COUNTRY_NAMES[code]||code)+' ('+counts[code]+')</button>';
    });
    html += '<span class="filter-sep"></span>';
    html += '<button class="filter-chip new-toggle'+(FILTERS.newOnly?' active':'')+'" onclick="toggleNewOnly()">New only</button>';
    var filtersActive = FILTERS.newOnly || (FILTERS.countries && FILTERS.countries.length !== codes.length);
    if(filtersActive){
      html += '<a class="filter-reset" onclick="resetFilters()">&#9888; Filters active — reset to show all</a>';
    }
    html += '</div>';
    return html;
  }
  function flagSpan(ent){ return '<span class="flag-inline">'+esc(ent.flag)+'</span>'; }
  function newBadge(ent){ return isNewEntity(ent) ? ' <span class="badge-new">NEW</span>' : ''; }


  function fmtDate(iso){
    if(!iso) return '';
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var p = iso.split('-'); return months[parseInt(p[1],10)-1] + ' ' + parseInt(p[2],10) + ', ' + p[0];
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function confClass(c){ return 'conf-' + (c||'na'); }
  function confLabel(item){ return item.conf === 'na' ? 'N/A' : ('Confidence ' + item.pct + '%'); }
  function renderSources(sources){
    if(!sources || !sources.length) return '';
    return '<span class="src">Source: ' + sources.map(function(s){ return '<a href="'+esc(s.url)+'" target="_blank" rel="noopener">'+esc(s.label)+'</a>'; }).join(' ') + '</span>';
  }
  function renderItems(items){
    return '<ul class="items">' + items.map(function(it){
      return '<li>' + (it.cat ? '<span class="cat-tag">'+esc(it.cat)+'</span>' : '') + esc(it.text) +
        '<span class="conf '+confClass(it.conf)+'">'+confLabel(it)+'</span>' + renderSources(it.sources) + '</li>';
    }).join('') + '</ul>';
  }
  function latestSection(ent){
    return (ent.biz.updatedISO >= ent.ux.updatedISO) ? {kind:'Business', sec: ent.biz} : {kind:'Product', sec: ent.ux};
  }
  function snippet(text, max){
    max = max || 130;
    return text.length > max ? text.slice(0, max).replace(/\s+\S*$/, '') + '…' : text;
  }
  function logoBadge(ent, size){
    var style = size ? ('width:'+size+'px;height:'+size+'px;border-radius:'+Math.round(size*0.3)+'px;font-size:'+Math.round(size*0.32)+'px') : '';
    return '<div class="vc-logo-badge" style="'+style+'">' + esc(ent.mono) + '</div>';
  }

  /* ---- Notification status (new / read / uptodate), per VeilleCard handoff ----
     "new"      = entity content changed in the latest weekly pass, not yet opened by this visitor
     "read"     = entity content changed in the latest weekly pass, already opened by this visitor
     "uptodate" = nothing changed for this entity in the latest weekly pass                        */
  function latestUpdateISO(ent){
    return (ent.biz.updatedISO >= ent.ux.updatedISO) ? ent.biz.updatedISO : ent.ux.updatedISO;
  }
  function hasRecentUpdate(ent){ return latestUpdateISO(ent) === DATA.meta.lastUpdated; }
  function loadViewed(){
    try { var raw = localStorage.getItem('watchViewed'); if(raw) return JSON.parse(raw); } catch(e){}
    return {};
  }
  var VIEWED = loadViewed();
  function saveViewed(){ try { localStorage.setItem('watchViewed', JSON.stringify(VIEWED)); } catch(e){} }
  function markViewed(ent){ VIEWED[ent.id] = latestUpdateISO(ent); saveViewed(); }
  function cardStatus(ent){
    if(hasRecentUpdate(ent)) return (VIEWED[ent.id] === latestUpdateISO(ent)) ? 'read' : 'new';
    return 'uptodate';
  }
  var VC_SIGNAL = {
    new:      { icon: 'campaign',  label: 'Nouvelles infos', sub: 'Depuis votre dernière visite' },
    uptodate: { icon: 'verified',  label: 'À jour',           sub: 'Rien de neuf' },
    read:     { icon: 'done_all',  label: 'Déjà consulté',    sub: 'Vous êtes à jour' }
  };
  function teaserFor(ent){
    var latest = latestSection(ent);
    return snippet(latest.sec.items[0].text, 78);
  }
  function veilleCardHTML(ent){
    var status = cardStatus(ent);
    var s = VC_SIGNAL[status] || VC_SIGNAL.uptodate;
    var countryName = COUNTRY_NAMES[ent.country] || ent.country;
    return '<article class="vc-card" data-status="'+status+'" onclick="navigate(\'#/company/'+ent.id+'\')">' +
      '<span class="vc-badge"><span class="vc-badge-dot"></span>Non lu</span>' +
      '<div class="vc-head">' +
        '<div class="vc-logo-wrap"><span class="vc-logo-ring"></span><div class="vc-logo">'+esc(ent.mono)+'</div></div>' +
        '<div class="vc-id">' +
          '<div class="vc-name"><span class="vc-flag">'+esc(ent.flag)+'</span><span class="vc-name-text">'+esc(ent.name)+'</span></div>' +
          '<div class="vc-country">'+esc(countryName)+'</div>' +
        '</div>' +
      '</div>' +
      '<span class="vc-sector">'+esc(ent.tag)+'</span>' +
      '<div class="vc-signal">' +
        '<span class="material-symbols-rounded vc-signal-icon">'+s.icon+'</span>' +
        '<div><div class="vc-signal-label">'+s.label+'</div><div class="vc-signal-sub">'+s.sub+'</div></div>' +
      '</div>' +
      '<p class="vc-teaser">'+esc(teaserFor(ent))+'</p>' +
      '<div><a class="vc-link" onclick="event.stopPropagation();navigate(\'#/company/'+ent.id+'\')">Voir la fiche<span class="material-symbols-rounded">arrow_forward</span></a></div>' +
    '</article>';
  }

  function navigate(hash){ location.hash = hash; }
  window.navigate = navigate;

  function renderNav(active){
    var html = '<a class="nav-pill'+(active==='home'?' active':'')+'" onclick="navigate(\'#/\')">Home</a>';
    DATA.categories.forEach(function(c){
      if(c.id === 'self-check') return;
      html += '<a class="nav-pill'+(active===('cat:'+c.id)?' active':'')+'" onclick="navigate(\'#/category/'+c.id+'\')">'+esc(c.label)+'</a>';
    });
    html += '<a class="nav-pill'+(active==='log'?' active':'')+'" onclick="navigate(\'#/log\')">Methodology &amp; Log</a>';
    document.getElementById('nav-bar').innerHTML = html;
  }

  function renderBackNav(hash, label){
    document.getElementById('nav-bar').innerHTML =
      '<a class="nav-pill home" onclick="navigate(\''+hash+'\')">&larr; '+esc(label)+'</a>' +
      '<a class="nav-pill" onclick="navigate(\'#/\')">Home</a>';
  }

  function renderMetaBar(){
    document.getElementById('meta-bar').innerHTML =
      '<span><b>'+DATA.meta.entityCount+' entities</b> across <b>'+DATA.categories.length+' categories</b></span>' +
      '<span>·</span><span>Last updated: <b>'+fmtDate(DATA.meta.lastUpdated)+'</b></span>' +
      '<span>·</span><span>Frequency: <b>weekly (Monday)</b></span>';
  }

  function hexToRgba(hex, alpha){
    hex = String(hex).replace('#','');
    if(hex.length===3) hex = hex.split('').map(function(c){ return c+c; }).join('');
    var r=parseInt(hex.substr(0,2),16), g=parseInt(hex.substr(2,2),16), b=parseInt(hex.substr(4,2),16);
    return 'rgba('+r+','+g+','+b+','+alpha+')';
  }

  function homeView(){
    renderNav('home');
    var html = renderFilterBar();
    DATA.categories.forEach(function(cat){
      var allEnts = DATA.entities.filter(function(e){ return e.category === cat.id; });
      if(!allEnts.length) return;
      var ents = allEnts.filter(passesFilters);
      var tint = hexToRgba(cat.color, 0.12);
      html += '<div class="cat-heading" style="background:'+tint+'"><span class="cat-heading-dot" style="background:'+cat.color+'"></span><span class="cat-heading-label">'+esc(cat.label)+'</span><span class="cat-heading-count">'+ents.length+' / '+allEnts.length+' tracked</span></div>';
      if(!ents.length){ html += '<div class="empty-state">No entities in this category match the current filters.</div>'; return; }
      html += '<div class="vc-grid">';
      ents.forEach(function(ent){ html += veilleCardHTML(ent); });
      html += '</div>';
    });
    document.getElementById('app').innerHTML = html;
  }

  function categoryView(catId){
    var cat = catById[catId];
    renderNav('cat:'+catId);
    if(!cat){ document.getElementById('app').innerHTML = '<p>Unknown category.</p>'; return; }
    var allEnts = DATA.entities.filter(function(e){ return e.category === catId; });
    var ents = allEnts.filter(passesFilters);
    var html = '<div class="breadcrumb"><a onclick="navigate(\'#/\')">Home</a> / '+esc(cat.label)+'</div>';
    html += renderFilterBar();
    var tint = hexToRgba(cat.color, 0.12);
    html += '<div class="cat-heading" style="background:'+tint+'"><span class="cat-heading-dot" style="background:'+cat.color+'"></span><span class="cat-heading-label">'+esc(cat.label)+'</span><span class="cat-heading-count">'+ents.length+' / '+allEnts.length+' tracked</span></div>';
    html += '<div class="section-desc">'+esc(cat.desc)+'</div>';
    if(!ents.length){ html += '<div class="empty-state">No entities in this category match the current filters.</div>'; document.getElementById('app').innerHTML = html; return; }
    html += '<div class="vc-grid">';
    ents.forEach(function(ent){ html += veilleCardHTML(ent); });
    html += '</div>';
    document.getElementById('app').innerHTML = html;
  }

  function companyView(id){
    var ent = entById[id];
    if(!ent){ renderNav(null); document.getElementById('app').innerHTML = '<p>Unknown entity.</p>'; return; }
    markViewed(ent);
    var cat = catById[ent.category];
    renderBackNav('#/category/'+cat.id, 'Back to '+cat.label);
    var html = '<div class="breadcrumb"><a onclick="navigate(\'#/\')">Home</a> / <a onclick="navigate(\'#/category/'+cat.id+'\')">'+esc(cat.label)+'</a> / '+esc(ent.name)+'</div>';
    html += '<div class="company-head">'+logoBadge(ent,52)+'<div><h1>'+flagSpan(ent)+esc(ent.name)+newBadge(ent)+'</h1><span class="tag'+(ent.special==='lbc'?' tag-lbc':'')+'">'+esc(ent.tag)+'</span></div></div>';
    html += '<div class="company-sub">Category: '+esc(cat.label)+'</div>';

    html += '<div class="detail-card'+(ent.special==='lbc'?' lbc':'')+'">' +
      '<div class="detail-head"><h2>Product / UX Updates</h2><span class="updated">Updated: '+fmtDate(ent.ux.updatedISO)+'</span></div>' +
      renderItems(ent.ux.items) +
      '<div class="watch">'+esc(ent.ux.watch)+'</div>' +
    '</div>';

    html += '<div class="detail-card'+(ent.special==='lbc'?' lbc':'')+'">' +
      '<div class="detail-head"><h2>Business / Market Updates</h2><span class="updated">Updated: '+fmtDate(ent.biz.updatedISO)+'</span></div>' +
      renderItems(ent.biz.items) +
      '<div class="watch">'+esc(ent.biz.watch)+'</div>' +
    '</div>';

    document.getElementById('app').innerHTML = html;
  }

  function logView(){
    renderNav('log');
    var html = '<div class="methodology">' +
      '<b>Sources scanned per entity</b>: Help Center / changelog / release-notes pages, official product blogs and press releases, App Store / Google Play release notes, official social media, investor relations, earnings transcripts, recognized trade press.<br>' +
      '<b>Confidence score</b>: <span class="conf conf-high">≥80% = reliable, primary source</span> <span class="conf conf-med">55-79% = needs cross-checking</span> <span class="conf conf-low">&lt;55% = needs verification</span> <span class="conf conf-na">N/A = no update found this period</span>.<br>' +
      '<b>LittleBig Connection card</b> (shaded blue-gray): not a competitor entry — it applies the exact same public-source methodology to LBC itself, so we can see what a competitor doing OSINT on us would find.<br>' +
      '<b>Categories</b> (added July 10, 2026): entities are grouped into 7 categories (see Home) instead of a flat list, to keep 23 tracked entities navigable. Logos are represented as stylized initials rather than scraped brand marks, to avoid trademark/copyright issues.<br>' +
      '<b>Discovery scope</b>: each pass runs 2 discovery searches for new/emerging entrants across all categories; qualifying finds get a permanent card. Low-quality SEO-listicle mentions without a dated primary-source launch are deliberately not added.<br>' +
      'This page is updated automatically every week; the entries reflect research conducted on <b>'+fmtDate(DATA.meta.lastUpdated)+'</b>.' +
    '</div>';
    html += '<div class="section-heading"><h2>Update history</h2></div>';
    DATA.history.forEach(function(h){
      html += '<div class="history-entry"><span class="date">'+esc(h.date)+'</span> — '+esc(h.text)+'</div>';
    });
    document.getElementById('app').innerHTML = html;
  }

  function router(){
    var hash = location.hash || '#/';
    var m;
    if(hash === '#/' || hash === '' ){ homeView(); }
    else if((m = hash.match(/^#\/category\/([a-z0-9-]+)$/))){ categoryView(m[1]); }
    else if((m = hash.match(/^#\/company\/([a-z0-9-]+)$/))){ companyView(m[1]); }
    else if(hash === '#/log'){ logView(); }
    else { homeView(); }
    window.scrollTo(0,0);
  }

  renderMetaBar();
  window.addEventListener('hashchange', router);
  router();
})();
</script>

</body>
</html>
