<script>
(function(){
  var DATA = JSON.parse(document.getElementById('watch-data').textContent);
  var catById = {}; DATA.categories.forEach(function(c){ catById[c.id] = c; });
  var entById = {}; DATA.entities.forEach(function(e){ entById[e.id] = e; });

  function fmtDate(iso){
    if(!iso) return '';
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var p = iso.split('-'); return months[parseInt(p[1],10)-1] + ' ' + parseInt(p[2],10) + ', ' + p[0];
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function confClass(c){ return 'conf-' + (c||'na'); }
  function confLabel(item){ return item.conf === 'na' ? 'N/A' : ('Confidence ' + item.pct + '%'); }
  function renderSources(sources){
    if(!sources || !sources.length) return '';
    return '<span class="src">Source: ' + sources.map(function(s){ return '<a href="'+esc(s.url)+'" target="_blank" rel="noopener">'+esc(s.label)+'</a>'; }).join(' ') + '</span>';
  }
  function renderItems(items){
    return '<ul class="items">' + items.map(function(it){
      return '<li>' + (it.cat ? '<span class="cat-tag">'+esc(it.cat)+'</span>' : '') + esc(it.text) +
        '<span class="conf '+confClass(it.conf)+'">'+confLabel(it)+'</span>' + renderSources(it.sources) + '</li>';
    }).join('') + '</ul>';
  }
  function latestSection(ent){
    return (ent.biz.updatedISO >= ent.ux.updatedISO) ? {kind:'Business', sec: ent.biz} : {kind:'Product', sec: ent.ux};
  }
  function snippet(text, max){
    max = max || 130;
    return text.length > max ? text.slice(0, max).replace(/\s+\S*$/, '') + '…' : text;
  }
  function logoBadge(ent, size){
    var color = catById[ent.category] ? catById[ent.category].color : '#8a5a2a';
    var style = 'background:' + color + (size ? ';width:'+size+'px;height:'+size+'px;border-radius:'+Math.round(size*0.28)+'px;font-size:'+Math.round(size*0.3)+'px' : '');
    return '<div class="logo-badge" style="'+style+'">' + esc(ent.mono) + '</div>';
  }

  function navigate(hash){ location.hash = hash; }
  window.navigate = navigate;

  function renderNav(active){
    var html = '<a class="nav-pill home" onclick="navigate(\'#/\')">Home</a>';
    DATA.categories.forEach(function(c){
      if(c.id === 'self-check') return;
      html += '<a class="nav-pill'+(active===('cat:'+c.id)?' active':'')+'" onclick="navigate(\'#/category/'+c.id+'\')">'+esc(c.label)+'</a>';
    });
    html += '<a class="nav-pill'+(active==='log'?' active':'')+'" onclick="navigate(\'#/log\')">Methodology &amp; Log</a>';
    document.getElementById('nav-bar').innerHTML = html;
  }

  function renderMetaBar(){
    document.getElementById('meta-bar').innerHTML =
      '<span><b>'+DATA.meta.entityCount+' entities</b> across <b>'+DATA.categories.length+' categories</b></span>' +
      '<span>·</span><span>Last updated: <b>'+fmtDate(DATA.meta.lastUpdated)+'</b></span>' +
      '<span>·</span><span>Frequency: <b>weekly (Monday)</b></span>';
  }

  function homeView(){
    renderNav('home');
    var html = '';
    DATA.categories.forEach(function(cat){
      var ents = DATA.entities.filter(function(e){ return e.category === cat.id; });
      if(!ents.length) return;
      html += '<div class="section-heading"><h2>'+esc(cat.label)+'</h2><span class="count">'+ents.length+' tracked</span></div>';
      html += '<div class="section-desc">'+esc(cat.desc)+'</div>';
      html += '<div class="grid">';
      ents.forEach(function(ent){
        var latest = latestSection(ent);
        var item = latest.sec.items[0];
        html += '<div class="glance-card'+(ent.special==='lbc'?' lbc':'')+'" onclick="navigate(\'#/company/'+ent.id+'\')">' +
          logoBadge(ent) +
          '<div class="glance-body">' +
            '<div class="glance-top"><h3>'+esc(ent.name)+'</h3><span class="glance-date">'+fmtDate(latest.sec.updatedISO)+'</span></div>' +
            '<div class="glance-tag">'+esc(ent.tag)+'</div>' +
            '<div class="glance-snippet"><span class="kind">'+latest.kind+':</span> '+esc(snippet(item.text))+'</div>' +
          '</div>' +
        '</div>';
      });
      html += '</div>';
    });
    document.getElementById('app').innerHTML = html;
  }

  function categoryView(catId){
    var cat = catById[catId];
    renderNav('cat:'+catId);
    if(!cat){ document.getElementById('app').innerHTML = '<p>Unknown category.</p>'; return; }
    var ents = DATA.entities.filter(function(e){ return e.category === catId; });
    var html = '<div class="breadcrumb"><a onclick="navigate(\'#/\')">Home</a> / '+esc(cat.label)+'</div>';
    html += '<div class="section-heading"><h2>'+esc(cat.label)+'</h2><span class="count">'+ents.length+' tracked</span></div>';
    html += '<div class="section-desc">'+esc(cat.desc)+'</div>';
    html += '<div class="grid wide">';
    ents.forEach(function(ent){
      var uxItem = ent.ux.items[0], bizItem = ent.biz.items[0];
      html += '<div class="cat-card'+(ent.special==='lbc'?' lbc':'')+'">' +
        '<div class="cat-card-head">'+logoBadge(ent,36)+'<div><h3>'+esc(ent.name)+'</h3><span class="tag'+(ent.special==='lbc'?' tag-lbc':'')+'">'+esc(ent.tag)+'</span></div></div>' +
        '<div class="mini-sec"><b>Product / UX ('+fmtDate(ent.ux.updatedISO)+')</b>'+esc(snippet(uxItem.text,150))+'</div>' +
        '<div class="mini-sec"><b>Business / Market ('+fmtDate(ent.biz.updatedISO)+')</b>'+esc(snippet(bizItem.text,150))+'</div>' +
        '<a class="view-link" onclick="navigate(\'#/company/'+ent.id+'\')">View full detail →</a>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('app').innerHTML = html;
  }

  function companyView(id){
    var ent = entById[id];
    renderNav(null);
    if(!ent){ document.getElementById('app').innerHTML = '<p>Unknown entity.</p>'; return; }
    var cat = catById[ent.category];
    var html = '<div class="breadcrumb"><a onclick="navigate(\'#/\')">Home</a> / <a onclick="navigate(\'#/category/'+cat.id+'\')">'+esc(cat.label)+'</a> / '+esc(ent.name)+'</div>';
    html += '<div class="company-head">'+logoBadge(ent,52)+'<div><h1>'+esc(ent.name)+'</h1><span class="tag'+(ent.special==='lbc'?' tag-lbc':'')+'">'+esc(ent.tag)+'</span></div></div>';
    html += '<div class="company-sub">Category: '+esc(cat.label)+'</div>';

    html += '<div class="detail-card'+(ent.special==='lbc'?' lbc':'')+'">' +
      '<div class="detail-head"><h2>Product / UX Updates</h2><span class="updated">Updated: '+fmtDate(ent.ux.updatedISO)+'</span></div>' +
      renderItems(ent.ux.items) +
      '<div class="watch">'+esc(ent.ux.watch)+'</div>' +
    '</div>';

    html += '<div class="detail-card'+(ent.special==='lbc'?' lbc':'')+'">' +
      '<div class="detail-head"><h2>Business / Market Updates</h2><span class="updated">Updated: '+fmtDate(ent.biz.updatedISO)+'</span></div>' +
      renderItems(ent.biz.items) +
      '<div class="watch">'+esc(ent.biz.watch)+'</div>' +
    '</div>';

    document.getElementById('app').innerHTML = html;
  }

  function logView(){
    renderNav('log');
    var html = '<div class="methodology">' +
      '<b>Sources scanned per entity</b>: Help Center / changelog / release-notes pages, official product blogs and press releases, App Store / Google Play release notes, official social media, investor relations, earnings transcripts, recognized trade press.<br>' +
      '<b>Confidence score</b>: <span class="conf conf-high">≥80% = reliable, primary source</span> <span class="conf conf-med">55-79% = needs cross-checking</span> <span class="conf conf-low">&lt;55% = needs verification</span> <span class="conf conf-na">N/A = no update found this period</span>.<br>' +
      '<b>LittleBig Connection card</b> (shaded blue-gray): not a competitor entry — it applies the exact same public-source methodology to LBC itself, so we can see what a competitor doing OSINT on us would find.<br>' +
      '<b>Categories</b> (added July 10, 2026): entities are grouped into 7 categories (see Home) instead of a flat list, to keep 23 tracked entities navigable. Logos are represented as stylized initials rather than scraped brand marks, to avoid trademark/copyright issues.<br>' +
      '<b>Discovery scope</b>: each pass runs 2 discovery searches for new/emerging entrants across all categories; qualifying finds get a permanent card. Low-quality SEO-listicle mentions without a dated primary-source launch are deliberately not added.<br>' +
      'This page is updated automatically every week; the entries reflect research conducted on <b>'+fmtDate(DATA.meta.lastUpdated)+'</b>.' +
    '</div>';
    html += '<div class="section-heading"><h2>Update history</h2></div>';
    DATA.history.forEach(function(h){
      html += '<div class="history-entry"><span class="date">'+esc(h.date)+'</span> — '+esc(h.text)+'</div>';
    });
    document.getElementById('app').innerHTML = html;
  }

  function router(){
    var hash = location.hash || '#/';
    var m;
    if(hash === '#/' || hash === '' ){ homeView(); }
    else if((m = hash.match(/^#\/category\/([a-z0-9-]+)$/))){ categoryView(m[1]); }
    else if((m = hash.match(/^#\/company\/([a-z0-9-]+)$/))){ companyView(m[1]); }
    else if(hash === '#/log'){ logView(); }
    else { homeView(); }
    window.scrollTo(0,0);
  }

  renderMetaBar();
  window.addEventListener('hashchange', router);
  router();
})();
</script>
